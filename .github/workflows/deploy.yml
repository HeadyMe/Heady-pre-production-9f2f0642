name: Heady Autonomous Projections

# Triggered on push to main — all deployments are projections
# from the monorepo source of truth, which is itself a projection
# from Heady's 3D vector space operations.

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      target:
        description: 'Projection target (all, hf, cloudrun, edge)'
        default: 'all'
        type: string

env:
  NODE_VERSION: '22'

jobs:
  # ═══════════════════════════════════════════════════════════════
  # PHASE 1: Validate monorepo integrity
  # ═══════════════════════════════════════════════════════════════
  validate:
    name: 🧬 Validate Monorepo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm install --ignore-scripts 2>/dev/null || true
      - name: Validate core modules
        run: |
          echo "🧬 Validating Heady v3.0.1 monorepo..."
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            console.log('  ✓ Package:', pkg.name, 'v' + pkg.version);

            // Check critical source files exist
            const critical = [
              'src/vector-memory.js',
              'src/bees/bee-factory.js',
              'src/core/audio-overview.js',
            ];
            let ok = 0;
            for (const f of critical) {
              if (fs.existsSync(f)) { console.log('  ✓', f); ok++; }
              else { console.log('  ⚠', f, '(missing)'); }
            }
            console.log('  →', ok + '/' + critical.length, 'core files present');
          "

  # ═══════════════════════════════════════════════════════════════
  # PHASE 2: Project to Cloud Run (primary compute)
  # ═══════════════════════════════════════════════════════════════
  project-cloudrun:
    name: ☁️ Project → Cloud Run
    needs: validate
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && vars.ENABLE_CLOUDRUN_DEPLOY == 'true') ||
      (github.event.inputs.target == 'all' || github.event.inputs.target == 'cloudrun')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy heady-manager \
            --source . \
            --region us-central1 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --timeout 300 \
            --set-env-vars="NODE_ENV=production"

  # ═══════════════════════════════════════════════════════════════
  # PHASE 3: Project to HuggingFace Spaces
  # ═══════════════════════════════════════════════════════════════
  project-hf-spaces:
    name: 🤗 Project → HF Spaces
    needs: validate
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && vars.ENABLE_HF_DEPLOY == 'true') ||
      (github.event.inputs.target == 'all' || github.event.inputs.target == 'hf')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install --ignore-scripts 2>/dev/null || true
      - name: Install git-lfs
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git-lfs
          git lfs install
      - name: Build & Deploy HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: node scripts/deploy-hf-spaces.js

  # ═══════════════════════════════════════════════════════════════
  # PHASE 4: Project to Cloudflare Edge
  # ═══════════════════════════════════════════════════════════════
  project-edge:
    name: ⚡ Project → Cloudflare Edge
    needs: validate
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && vars.ENABLE_EDGE_DEPLOY == 'true') ||
      (github.event.inputs.target == 'all' || github.event.inputs.target == 'edge')
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Edge Proxy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: cloudflare-workers
          command: deploy heady-edge-proxy.js

  # ═══════════════════════════════════════════════════════════════
  # PHASE 5: Verify all projections
  # ═══════════════════════════════════════════════════════════════
  verify-projections:
    name: ✅ Verify Projections
    needs: [validate]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Health Probes
        run: |
          echo "🐝 Verifying Heady projections..."
          for url in \
            "https://heady-manager-609590223909.us-central1.run.app/health" \
            "https://headyme-site-609590223909.us-central1.run.app" \
            "https://huggingface.co/spaces/HeadyMe/heady-ai" \
            "https://huggingface.co/spaces/HeadyMe/heady-demo"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "  ✅ $url → $STATUS"
            else
              echo "  ⚠️  $url → $STATUS (non-critical)"
            fi
          done
          echo "✓ Projection verification complete"
